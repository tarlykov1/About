<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Лошадка с всадником — мини-игра</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #87ceeb;
      --field: #7bc96f;
      --text: #ffffff;
      --panel: rgba(0, 0, 0, 0.3);
      --accent: #ffe082;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #c5ecff 0, #74bfe9 60%, #4682b4 100%);
      touch-action: manipulation;
      user-select: none;
    }

    .game-wrap {
      width: min(100vw, 430px);
      padding: 12px;
    }

    .stage {
      position: relative;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--text);
      background: var(--panel);
      border-radius: 12px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-weight: 600;
      backdrop-filter: blur(6px);
      flex-wrap: wrap;
    }

    .hud-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 62px;
    }

    .hud-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      line-height: 1;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.4));
    }

    .hud-icon.horse {
      position: relative;
      border: 2px solid #ffd25b;
      border-top: 0;
      border-radius: 0 0 10px 10px;
      transform: translateY(1px);
    }

    canvas {
      width: 100%;
      border-radius: 14px;
      display: block;
      background: linear-gradient(to bottom, var(--bg) 0 65%, var(--field) 65% 100%);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      border: 2px solid rgba(255,255,255,.28);
      touch-action: none;
    }

    .hint {
      margin-top: 8px;
      text-align: center;
      color: #fff;
      font-size: 14px;
      text-shadow: 0 1px 2px rgba(0,0,0,.4);
    }

    .start {
      color: var(--accent);
      font-weight: 700;
    }

    .controls {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 18px;
    }

    .controls-panel {
      pointer-events: auto;
      display: none;
      flex-direction: column;
      gap: 10px;
      width: min(280px, 100%);
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      color: #fff;
      backdrop-filter: blur(5px);
    }

    .controls-panel.visible { display: flex; }

    .controls-panel h2 {
      margin: 0;
      font-size: 26px;
      color: #fff3c4;
    }

    .controls-panel p {
      margin: 0;
      opacity: .9;
      font-size: 15px;
    }

    .controls button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary { background: #ffe082; color: #1d1d1d; }
    .btn-secondary { background: #d6e4ff; color: #172b4d; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="game-wrap">
    <section class="hud" aria-live="polite">
      <div class="hud-item"><span class="hud-icon">🏁</span><span id="score">0</span></div>
      <div class="hud-item"><span class="hud-icon horse"></span><span id="horseshoes">0</span></div>
      <div class="hud-item">🏆 <span id="best">0</span></div>
      <div class="hud-item">⚡ <span id="speed">1.0x</span></div>
      <div class="hud-item">❤️ <span id="lives">3</span></div>
    </section>
    <div class="stage">
      <canvas id="game" width="390" height="640" aria-label="Игра: лошадка с всадником"></canvas>
      <div class="controls" aria-live="polite">
        <section class="controls-panel visible" id="startPanel">
          <h2>Конкур</h2>
          <p>Нажми «Старт», затем тапай по экрану для прыжков.</p>
          <button type="button" class="btn-primary" id="startBtn">Старт</button>
        </section>
        <section class="controls-panel" id="crashPanel">
          <h2>Столкновение</h2>
          <p id="crashText">Продолжить заезд или завершить попытку?</p>
          <button type="button" class="btn-secondary" id="continueBtn">Продолжить</button>
          <button type="button" class="btn-secondary hidden" id="buyLifeBtn">Купить жизнь за 5 подков</button>
          <button type="button" class="btn-primary" id="finishBtn">Закончить</button>
        </section>
        <section class="controls-panel" id="resultPanel">
          <h2>Твой результат</h2>
          <p id="resultText">0 очков</p>
          <button type="button" class="btn-primary" id="restartBtn">Начать заново</button>
        </section>
      </div>
    </div>
    <p class="hint"><span class="start">Старт</span> — кнопкой, в прыжке собирай подковы и избегай ежей.</p>
  </main>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const speedEl = document.getElementById('speed');
    const horseshoesEl = document.getElementById('horseshoes');
    const livesEl = document.getElementById('lives');
    const startPanel = document.getElementById('startPanel');
    const crashPanel = document.getElementById('crashPanel');
    const resultPanel = document.getElementById('resultPanel');
    const startBtn = document.getElementById('startBtn');
    const continueBtn = document.getElementById('continueBtn');
    const finishBtn = document.getElementById('finishBtn');
    const buyLifeBtn = document.getElementById('buyLifeBtn');
    const restartBtn = document.getElementById('restartBtn');
    const resultText = document.getElementById('resultText');
    const crashText = document.getElementById('crashText');

    const tgApp = {
      api: null,
      userName: '',
      available: false
    };

    const horseSprite = new Image();
    horseSprite.src = 'equestrian.svg';

    const GROUND_Y = canvas.height * 0.72;
    const horse = {
      x: 72,
      y: GROUND_Y,
      width: 84,
      height: 48,
      vy: 0,
      gravity: 0.95,
      jumpForce: -16,
      doubleJumpForce: -14,
      jumpsUsed: 0,
      onGround: true,
      bobTimer: 0
    };

    const game = {
      running: false,
      crashed: false,
      ended: false,
      score: 0,
      horseshoes: 0,
      continuesLeft: 3,
      best: Number(localStorage.getItem('horseBest') || 0),
      speed: 6,
      obstacles: [],
      prizes: [],
      clouds: [],
      nextObstacleIn: 70,
      nextPrizeIn: 150,
      frame: 0,
      message: 'Старт!'
    };

    bestEl.textContent = game.best;

    for (let i = 0; i < 4; i++) {
      game.clouds.push({
        x: Math.random() * canvas.width,
        y: 50 + Math.random() * 160,
        w: 45 + Math.random() * 55,
        s: 0.3 + Math.random() * 0.5
      });
    }

    function spawnObstacle() {
      const h = 34 + Math.random() * 34;
      const w = 22 + Math.random() * 26;
      const isBird = Math.random() < Math.min(0.45, 0.2 + game.score / 4500);
      const isHedgehog = !isBird && Math.random() < Math.min(0.22, 0.06 + game.score / 7500);
      const isTallFence = !isBird && !isHedgehog && Math.random() < Math.min(0.28, 0.08 + game.score / 6000);
      if (isBird) {
        const birdY = GROUND_Y - (horse.height + 25 + Math.random() * 70);
        game.obstacles.push({
          type: 'bird',
          x: canvas.width + 20,
          y: birdY,
          w: 34,
          h: 22,
          flap: Math.random() * Math.PI * 2
        });
        game.nextObstacleIn = 38 + Math.random() * 44;
        return;
      }

      if (isTallFence) {
        const tallH = 78 + Math.random() * 32;
        const tallW = 34 + Math.random() * 16;
        game.obstacles.push({
          type: 'tallFence',
          x: canvas.width + 20,
          y: GROUND_Y - tallH,
          w: tallW,
          h: tallH
        });
        game.nextObstacleIn = 62 + Math.random() * 76;
        return;
      }

      if (isHedgehog) {
        const hedgehogW = 34 + Math.random() * 10;
        const hedgehogH = 28 + Math.random() * 8;
        game.obstacles.push({
          type: 'hedgehog',
          x: canvas.width + 20,
          y: GROUND_Y - hedgehogH + 2,
          w: hedgehogW,
          h: hedgehogH
        });
        game.nextObstacleIn = 44 + Math.random() * 56;
        return;
      }

      game.obstacles.push({
        type: 'fence',
        x: canvas.width + 20,
        y: GROUND_Y - h,
        w,
        h
      });
      game.nextObstacleIn = 55 + Math.random() * 70;
    }

    function spawnHorseshoe() {
      let baseX = canvas.width + 30;
      const lastObstacle = game.obstacles[game.obstacles.length - 1];
      if (lastObstacle && lastObstacle.x > canvas.width * 0.52) {
        baseX = lastObstacle.x + lastObstacle.w + 12 + Math.random() * 28;
      }

      const minY = GROUND_Y - (horse.height + 118);
      const maxY = GROUND_Y - (horse.height + 30);
      const baseY = minY + Math.random() * (maxY - minY);

      const count = Math.random() < 0.34 ? (2 + Math.floor(Math.random() * 3)) : 1;
      for (let i = 0; i < count; i++) {
        const spreadX = i * (14 + Math.random() * 6);
        const spreadY = (Math.random() - 0.5) * 18;
        game.prizes.push({
          x: baseX + spreadX,
          y: Math.max(minY, Math.min(maxY, baseY + spreadY)),
          w: 18,
          h: 20,
          spin: Math.random() * Math.PI * 2
        });
      }

      game.nextPrizeIn = 155 + Math.random() * 220;
    }

    function getFinalScore() {
      return game.score + game.horseshoes;
    }

    const DOUBLE_TAP_MS = 280;
    let lastTapAt = 0;
    let lastTouchEndAt = 0;

    function jump(isDoubleTap = false, allowAirJump = false) {
      if (!game.running) return;
      if (horse.onGround) {
        horse.vy = horse.jumpForce;
        horse.onGround = false;
        horse.jumpsUsed = 1;
        return;
      }

      if (horse.jumpsUsed === 1 && (isDoubleTap || allowAirJump)) {
        horse.vy = horse.doubleJumpForce;
        horse.jumpsUsed = 2;
      }
    }

    function onPointerDown(e) {
      e.preventDefault();
      const now = performance.now();
      const isDoubleTap = now - lastTapAt < DOUBLE_TAP_MS;
      lastTapAt = now;
      jump(isDoubleTap);
    }

    function initTelegramWebApp() {
      const tg = window.Telegram?.WebApp;
      if (!tg) return;

      tgApp.api = tg;
      tgApp.available = true;
      tgApp.userName = tg.initDataUnsafe?.user?.first_name || '';

      tg.ready();
      tg.expand();
      tg.enableClosingConfirmation();

      try {
        tg.setHeaderColor('#2f6ea6');
        tg.setBackgroundColor('#74bfe9');
      } catch (e) {
        // noop: older clients may not support these methods
      }

      if (tgApp.userName) {
        crashText.textContent = `Удачи, ${tgApp.userName}!`;
      }
    }

    function updateTelegramMainButton(mode) {
      if (!tgApp.available || !tgApp.api?.MainButton) return;

      const btn = tgApp.api.MainButton;
      btn.offClick(finishRun);
      btn.offClick(restart);
      btn.offClick(continueRun);

      if (mode === 'start') {
        btn.setText('Старт заезда');
        btn.onClick(restart);
        btn.show();
        return;
      }

      if (mode === 'crash') {
        if (game.continuesLeft > 0) {
          btn.setText('Продолжить');
          btn.onClick(continueRun);
          btn.show();
          return;
        }

        btn.setText('Закончить');
        btn.onClick(finishRun);
        btn.show();
        return;
      }

      if (mode === 'result') {
        btn.setText('Начать заново');
        btn.onClick(restart);
        btn.show();
        return;
      }

      btn.hide();
    }

    function setPanel(mode) {
      startPanel.classList.toggle('visible', mode === 'start');
      crashPanel.classList.toggle('visible', mode === 'crash');
      resultPanel.classList.toggle('visible', mode === 'result');
      updateTelegramMainButton(mode);
    }

    function showContinueOption() {
      continueBtn.classList.remove('hidden');
      buyLifeBtn.classList.add('hidden');
      crashText.textContent = `Можно продолжить. Осталось попыток: ${game.continuesLeft}`;
      setPanel('crash');
    }

    function showBuyLifeOption() {
      continueBtn.classList.add('hidden');
      buyLifeBtn.classList.remove('hidden');
      crashText.textContent = 'Попытки закончились. Купить 1 жизнь за 5 подков?';
      setPanel('crash');
    }

    function restart() {
      game.running = true;
      game.crashed = false;
      game.ended = false;
      game.score = 0;
      game.horseshoes = 0;
      game.continuesLeft = 3;
      game.speed = 6;
      game.obstacles.length = 0;
      game.prizes.length = 0;
      game.nextObstacleIn = 50;
      game.nextPrizeIn = 140;
      horse.y = GROUND_Y;
      horse.vy = 0;
      horse.onGround = true;
      horse.jumpsUsed = 0;
      game.message = 'Поехали!';
      continueBtn.classList.remove('hidden');
      buyLifeBtn.classList.add('hidden');
      setPanel('none');
    }

    function continueRun() {
      game.running = true;
      game.crashed = false;
      horse.y = GROUND_Y;
      horse.vy = 0;
      horse.onGround = true;
      horse.jumpsUsed = 0;
      game.obstacles = game.obstacles.filter(ob => ob.x > horse.x + horse.width + 50);
      game.prizes = game.prizes.filter(pr => pr.x > horse.x + horse.width + 50);
      continueBtn.classList.remove('hidden');
      buyLifeBtn.classList.add('hidden');
      crashText.textContent = 'Продолжить заезд или завершить попытку?';
      setPanel('none');
    }

    function buyLife() {
      if (game.horseshoes < 5) {
        finishRun();
        return;
      }
      game.horseshoes -= 5;
      game.continuesLeft = 1;
      continueRun();
    }

    function finishRun() {
      game.running = false;
      game.crashed = false;
      game.ended = true;
      const total = getFinalScore();
      if (total > game.best) {
        game.best = total;
        localStorage.setItem('horseBest', game.best);
        bestEl.textContent = game.best;
      }
      resultText.textContent = `Дистанция: ${game.score} • Подковы: ${game.horseshoes} • Итог: ${total}`;
      crashText.textContent = game.continuesLeft > 0
        ? `Можно продолжить. Осталось попыток: ${game.continuesLeft}`
        : 'Попытки закончились. Игра завершена.';
      setPanel('result');
    }

    function intersects(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function update() {
      if (game.running) {
        game.frame += 1;

        game.clouds.forEach(cloud => {
          cloud.x -= cloud.s;
          if (cloud.x + cloud.w < 0) {
            cloud.x = canvas.width + 10;
            cloud.y = 50 + Math.random() * 160;
          }
        });
        game.score += 1;
        game.speed = 6 + Math.min(18, game.score / 220);

        horse.vy += horse.gravity;
        horse.y += horse.vy;

        if (horse.y >= GROUND_Y) {
          horse.y = GROUND_Y;
          horse.vy = 0;
          horse.onGround = true;
          horse.jumpsUsed = 0;
        }

        horse.bobTimer += 0.18;
        game.nextObstacleIn -= 1;
        if (game.nextObstacleIn <= 0) spawnObstacle();

        game.nextPrizeIn -= 1;
        if (game.nextPrizeIn <= 0 && Math.random() < 0.55) spawnHorseshoe();

        game.obstacles.forEach(ob => {
          ob.x -= game.speed;
          if (ob.type === 'bird') ob.flap += 0.28;
        });
        game.obstacles = game.obstacles.filter(ob => ob.x + ob.w > -20);

        game.prizes.forEach(pr => {
          pr.x -= game.speed;
          pr.spin += 0.2;
        });
        game.prizes = game.prizes.filter(pr => pr.x + pr.w > -20);

        const hitbox = {
          x: horse.x + 16,
          y: horse.y - horse.height + 6,
          w: horse.width - 22,
          h: horse.height - 10
        };

        for (let i = game.prizes.length - 1; i >= 0; i--) {
          if (intersects(hitbox, game.prizes[i])) {
            game.horseshoes += 1;
            game.prizes.splice(i, 1);
            tgApp.api?.HapticFeedback?.impactOccurred('light');
          }
        }

        for (const ob of game.obstacles) {
          if (intersects(hitbox, ob)) {
            game.running = false;
            game.crashed = true;
            game.message = 'Столкновение!';
            tgApp.api?.HapticFeedback?.notificationOccurred('error');
            game.continuesLeft -= 1;
            const total = getFinalScore();
            if (total > game.best) {
              game.best = total;
              localStorage.setItem('horseBest', game.best);
              bestEl.textContent = game.best;
            }

            if (game.continuesLeft > 0) {
              showContinueOption();
            } else if (game.horseshoes >= 5) {
              showBuyLifeOption();
            } else {
              finishRun();
            }
            break;
          }
        }
      }

      scoreEl.textContent = game.score;
      horseshoesEl.textContent = game.horseshoes;
      livesEl.textContent = Math.max(0, game.continuesLeft);
      speedEl.textContent = (game.speed / 6).toFixed(1) + 'x';
    }

    function drawHorse() {
      const bob = horse.onGround ? Math.sin(horse.bobTimer) * 1.4 : 0;
      const gallop = Math.sin(game.frame * 0.32);

      const spriteW = 92;
      const spriteH = 92;
      const drawX = horse.x - 6;
      const drawY = horse.y - 82 + bob;

      if (!(horseSprite.complete && horseSprite.naturalWidth > 0)) return;

      ctx.save();
      ctx.translate(drawX + spriteW * 0.34, drawY + spriteH * 0.63);
      ctx.rotate(gallop * 0.015);
      ctx.translate(-spriteW * 0.34, -spriteH * 0.63);
      ctx.drawImage(horseSprite, 0, 0, horseSprite.naturalWidth, horseSprite.naturalHeight, 0, 0, spriteW, spriteH);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      game.clouds.forEach(cloud => {
        ctx.fillStyle = 'rgba(255,255,255,.9)';
        ctx.beginPath();
        ctx.ellipse(cloud.x, cloud.y, cloud.w * 0.4, 16, 0, 0, Math.PI * 2);
        ctx.ellipse(cloud.x + cloud.w * 0.2, cloud.y - 8, cloud.w * 0.3, 14, 0, 0, Math.PI * 2);
        ctx.ellipse(cloud.x + cloud.w * 0.5, cloud.y, cloud.w * 0.35, 15, 0, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.fillStyle = '#5eaa4f';
      ctx.fillRect(0, GROUND_Y + 2, canvas.width, canvas.height - GROUND_Y);

      // scrolling grass strips
      const offset = (game.frame * game.speed * 0.4) % 40;
      ctx.fillStyle = '#4d913f';
      for (let x = -offset; x < canvas.width; x += 40) {
        ctx.fillRect(x, GROUND_Y + 2, 24, 6);
      }

      drawHorse();

      game.prizes.forEach(pr => {
        const wobble = Math.sin(pr.spin) * 2.2;
        const x = pr.x + pr.w / 2;
        const y = pr.y + pr.h / 2 + wobble;

        ctx.save();
        ctx.translate(x, y);
        ctx.scale(0.74, 0.74);

        // base horseshoe from reference style
        ctx.strokeStyle = '#2e313a';
        ctx.lineCap = 'round';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.arc(0, 0, 14, Math.PI * 0.2, Math.PI * 0.8, true);
        ctx.stroke();

        ctx.strokeStyle = '#f3b33e';
        ctx.lineWidth = 6.6;
        ctx.beginPath();
        ctx.arc(0, 0, 14, Math.PI * 0.2, Math.PI * 0.8, true);
        ctx.stroke();

        // screw holes
        ctx.fillStyle = '#2e313a';
        [[-9, 6], [0, 10], [9, 6]].forEach(([hx, hy]) => {
          ctx.beginPath();
          ctx.arc(hx, hy, 2.25, 0, Math.PI * 2);
          ctx.fill();
        });

        // highlight stripes
        ctx.strokeStyle = 'rgba(255,255,255,.9)';
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(-8, -2);
        ctx.quadraticCurveTo(-10, 2, -8.8, 6.8);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(8, -2);
        ctx.quadraticCurveTo(10, 2, 8.8, 6.8);
        ctx.stroke();

        ctx.restore();
      });

      game.obstacles.forEach(ob => {
        if (ob.type === 'bird') {
          const wing = Math.sin(ob.flap) * 5;
          const bodyY = ob.y + 10;

          ctx.fillStyle = '#2f3d4a';
          ctx.beginPath();
          ctx.ellipse(ob.x + 17, bodyY, 11, 7, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = '#1f2a34';
          ctx.beginPath();
          ctx.moveTo(ob.x + 14, bodyY - 2);
          ctx.lineTo(ob.x + 2, bodyY - 6 - wing);
          ctx.lineTo(ob.x + 8, bodyY + 1);
          ctx.closePath();
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(ob.x + 20, bodyY - 2);
          ctx.lineTo(ob.x + 33, bodyY - 6 + wing);
          ctx.lineTo(ob.x + 25, bodyY + 1);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#f2c14e';
          ctx.beginPath();
          ctx.moveTo(ob.x + 28, bodyY);
          ctx.lineTo(ob.x + 34, bodyY + 2);
          ctx.lineTo(ob.x + 28, bodyY + 4);
          ctx.closePath();
          ctx.fill();
          return;
        }

        if (ob.type === 'hedgehog') {
          const cx = ob.x + ob.w * 0.5;
          const cy = ob.y + ob.h * 0.58;
          const spikes = 8;
          for (let i = 0; i < spikes; i++) {
            const sx = ob.x + 2 + (i * (ob.w - 4)) / (spikes - 1);
            ctx.fillStyle = '#4d3a2f';
            ctx.beginPath();
            ctx.moveTo(sx - 3, cy);
            ctx.lineTo(sx, ob.y - 2 - (i % 2) * 2);
            ctx.lineTo(sx + 3, cy);
            ctx.closePath();
            ctx.fill();
          }

          ctx.fillStyle = '#70513e';
          ctx.beginPath();
          ctx.ellipse(cx, cy, ob.w * 0.46, ob.h * 0.44, 0, Math.PI, 0, true);
          ctx.fill();

          ctx.fillStyle = '#2b2018';
          ctx.beginPath();
          ctx.arc(ob.x + ob.w * 0.75, cy - 2, 1.8, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = '#c89a6a';
          ctx.beginPath();
          ctx.arc(ob.x + ob.w * 0.92, cy + 1, 1.6, 0, Math.PI * 2);
          ctx.fill();
          return;
        }

        const left = ob.x;
        const right = ob.x + ob.w;
        const baseY = GROUND_Y;
        const isTallFence = ob.type === 'tallFence';

        // show-jumping standards
        ctx.fillStyle = '#f4f0e6';
        ctx.fillRect(left - 6, baseY - ob.h - 12, 8, ob.h + 12);
        ctx.fillRect(right - 2, baseY - ob.h - 12, 8, ob.h + 12);
        ctx.fillStyle = '#cfcbc2';
        ctx.fillRect(left - 8, baseY - 8, 12, 8);
        ctx.fillRect(right - 4, baseY - 8, 12, 8);

        // colored poles
        const poleGap = isTallFence ? 10 : 11;
        const poleCount = isTallFence ? 5 : 3;
        for (let i = 0; i < poleCount; i++) {
          const y = baseY - 18 - i * poleGap;
          ctx.fillStyle = i % 2 ? (isTallFence ? '#b12a24' : '#b9382f') : '#ffffff';
          ctx.fillRect(left + 1, y, ob.w - 2, 5);
          ctx.fillStyle = '#2b2b2b';
          ctx.fillRect(left + 1 + (game.frame % 10), y, 6, 5);
        }
      });

      if (game.crashed) {
        ctx.fillStyle = 'rgba(0,0,0,.35)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff3c4';
        ctx.font = 'bold 28px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('Столкновение!', canvas.width / 2, canvas.height / 2 - 14);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    startBtn.addEventListener('click', restart);
    continueBtn.addEventListener('click', continueRun);
    buyLifeBtn.addEventListener('click', buyLife);
    finishBtn.addEventListener('click', finishRun);
    restartBtn.addEventListener('click', restart);

    canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
    canvas.addEventListener('dblclick', (e) => e.preventDefault());
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEndAt <= DOUBLE_TAP_MS) {
        e.preventDefault();
      }
      lastTouchEndAt = now;
    }, { passive: false });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (game.running) jump(false, true);
      }
    });

    initTelegramWebApp();
    setPanel('start');
    loop();
  </script>
</body>
</html>
